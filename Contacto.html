<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    
</head>

<body class="body.home">
    <header>
        <nav>
            <a href="index.html">
                <img class="logo" src="img/logo.png" alt="logo">

            </a>

            <ul>
                <li> <a href="index.html">Inicio</a></li>
                <li> <a href="Galeria.html">Galería</a> </li>
                <li> <a href="Videos.html">Videos</a> </li>
                <li> <a href="Calendario.html">Calendario</a> </li>
                <li> <a href="Contacto.html">Contacto</a> </li>
            </ul>
        </nav>
    </header>

    <main>


        <section class="form-container">
            <form action="#">

                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input name=name type="text" required placeholder="Nombre">
                </div>

                <div class="form-group">
                    <label for="lastname">Apellido</label>
                    <input name=name type="text" required placeholder="Apellido">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input name=name type="email" required placeholder="Email">
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input name=name type="tel" required placeholder="Teléfono">
                </div>

                <div class="form-group">
                    <label for="reason">Razón de contacto</label>
                    <select name="reason" id="reason" required>
                        <option value="" disabled selected>Elija una opción</option>
                        <option value="buy">Comprar foto</option>
                        <option value="hire">Contratar servicio</option>
                        <option value="price">Presupuesto</option>
                        <option value="information">Información</option>
                        <option value="other">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="commet">Comentario</label>
                    <textarea rows="5" cols="35" name="comment" id="comment" required placeholder="Escriba su consulta"></textarea>
                </div>

                <div class="form-group button-container">
                <button class="btn btn-primary" type="summit">Enviar</button>
                <button class="btn btn-danger" type="reset">Reset</button>
                </div>

            </form>

        </section>


    </main>

    <footer>
        <ul class="footer-navegation">

            <li> <a href="Galeria.html">Galería</a> </li>
            <li> <a href="Videos.html">Videos</a> </li>
            <li> <a href="Calendario.html">Calendario</a> </li>
            <li> <a href="Contacto.html">Contacto</a> </li>
        </ul>
        <p>© 2025 JC, Inc. Todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
